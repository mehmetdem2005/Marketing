# Köyden detekt yapılandırması — buildUponDefaultConfig=true ile birlikte çalışır.
# Kalite + bakım + (formatting eklentisi ile) stil kapısı.

build:
  maxIssues: 0
  # autoCorrect ile düzeltilebilen (ktlint formatting) ihlaller sayıma dahil edilmez.
  excludeCorrectable: true

config:
  validation: true
  warningsAsErrors: false

complexity:
  active: true
  LongMethod:
    threshold: 80
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
    ignoreDefaultParameters: true
  TooManyFunctions:
    thresholdInFiles: 30
    thresholdInClasses: 20
  CyclomaticComplexMethod:
    threshold: 18

style:
  active: true
  MagicNumber:
    active: false
  ReturnCount:
    max: 4
  MaxLineLength:
    maxLineLength: 140
  UnusedPrivateMember:
    active: true
  ForbiddenComment:
    active: false

exceptions:
  active: true
  # Sınır (adapter/credential) katmanında geniş yakalama bilinçlidir: tüm hatalar
  # AppError'a eşlenip UI'a sızdırılmadan yönetilir (ISO 25010). CancellationException
  # her zaman yeniden fırlatılır.
  TooGenericExceptionCaught:
    active: false

naming:
  active: true
  # Çok bildirimli dosyalar (ör. KoydenButton.kt = fun + enum) kabul edilir.
  MatchingDeclarationName:
    active: false
  FunctionNaming:
    # Composable fonksiyonlar PascalCase olabilir.
    ignoreAnnotated: ['Composable']
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][_A-Za-z0-9]*'

comments:
  active: true
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false

formatting:
  active: true
  android: true
  autoCorrect: true
  MaximumLineLength:
    maxLineLength: 120
  Filename:
    active: false
