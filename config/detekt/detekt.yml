# Köyden detekt yapılandırması — buildUponDefaultConfig=true ile birlikte çalışır.
# Kalite + bakım + (formatting eklentisi ile) stil kapısı.

build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

complexity:
  active: true
  LongMethod:
    threshold: 80
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
    ignoreDefaultParameters: true
  TooManyFunctions:
    thresholdInFiles: 30
    thresholdInClasses: 20
  CyclomaticComplexMethod:
    threshold: 18

style:
  active: true
  MagicNumber:
    active: false
  ReturnCount:
    max: 4
  MaxLineLength:
    maxLineLength: 120
  UnusedPrivateMember:
    active: true
  ForbiddenComment:
    active: false

naming:
  active: true
  FunctionNaming:
    # Composable fonksiyonlar PascalCase olabilir.
    ignoreAnnotated: ['Composable']
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][_A-Za-z0-9]*'

comments:
  active: true
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false

formatting:
  active: true
  android: true
  autoCorrect: true
  MaximumLineLength:
    maxLineLength: 120
  Filename:
    active: false
