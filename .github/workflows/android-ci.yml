name: Android CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Sır taraması (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality:
    name: Kalite (detekt) + Test + Build
    runs-on: ubuntu-latest
    # SeçAl Supabase bağlantısı → BuildConfig (anon key & URL publishable; repo variable).
    # Gerçek sırlar (service_role vb.) burada DEĞİL.
    env:
      SECAL_SUPABASE_URL: ${{ vars.SECAL_SUPABASE_URL }}
      SECAL_SUPABASE_ANON_KEY: ${{ vars.SECAL_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v4

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: detekt (a11y/lint/format/kalite)
        run: ./gradlew detekt

      - name: Lint (Android)
        run: ./gradlew lintDebug

      - name: Birim testler
        run: ./gradlew testDebugUnitTest

      - name: Debug APK derle
        run: ./gradlew assembleDebug

      - name: Raporları yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/reports/detekt/**
            **/build/reports/lint-results-*.html
            **/build/reports/tests/**
          if-no-files-found: ignore

      - name: Debug APK yükle (telefona kurmak için indir)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: secal-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
